<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProTimer | SISD </title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans+Flex:opsz,wght@6..144,1..1000&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Saira:wght@400;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --swiss-red: #D52B1E;
            --swiss-white: #FFFFFF;
            --logo-bg: #ffffff; 
            --status-green: #10b981;
            --bg-primary: #ffffff;
            --bg-secondary: #f8fafc;
            --text-primary: #1e293b;
            --text-secondary: #64748b;
            --border-color: rgba(0, 0, 0, 0.08);
        }

        body.dark-mode {
            --bg-primary: #1e293b;
            --bg-secondary: #0f172a;
            --text-primary: #f1f5f9;
            --text-secondary: #cbd5e1;
            --border-color: rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: "Google Sans Flex", sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100dvh;
            margin: 0;
            display: flex;
            flex-direction: column;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        .mono { font-family: 'Saira', sans-serif; }

        .glass-card {
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            border-radius: 28px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.04), 0 4px 6px -2px rgba(0, 0, 0, 0.02);
            transition: background-color 0.3s ease, border-color 0.3s ease, color 0.3s ease;
        }

        body.dark-mode .glass-card {
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3), 0 4px 6px -2px rgba(0, 0, 0, 0.2);
        }

        .timer-card {
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            height: 100%;
            border-top: 8px solid var(--swiss-red);
        }

        /* Critical State: When timer ends */
        .timer-card.is-finished {
            background-color: var(--swiss-red);
            border-top-color: #991b1b;
            animation: pulse-red 2s infinite;
        }

        .timer-card.is-finished .timer-display,
        .timer-card.is-finished .timer-label,
        .timer-card.is-finished .mark-30,
        .timer-card.is-finished .mark-5,
        .timer-card.is-finished .text-slate-400,
        .timer-card.is-finished .text-slate-800,
        .timer-card.is-finished .text-slate-600 {
            color: white !important;
        }
        
        .timer-card.is-finished .border-y {
            border-color: rgba(255, 255, 255, 0.2);
        }

        .timer-card.is-finished .reset-btn {
            background-color: rgba(255, 255, 255, 0.2);
            color: white;
        }

        .timer-card.is-finished .toggle-btn {
            background-color: white;
            color: var(--swiss-red);
        }

        @keyframes pulse-red {
            0% { box-shadow: 0 0 0 0 rgba(213, 43, 30, 0.4); }
            70% { box-shadow: 0 0 0 20px rgba(213, 43, 30, 0); }
            100% { box-shadow: 0 0 0 0 rgba(213, 43, 30, 0); }
        }

        .timer-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.07);
        }

        .status-dot {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            transition: background-color 0.5s ease;
        }

        .status-red { background-color: var(--swiss-red); }
        .status-green { background-color: var(--status-green); }

        .hidden { display: none !important; }
        
        .fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        #timers-list {
            display: flex;
            flex-wrap: wrap;
            gap: 1.5rem;
            justify-content: center;
        }
        
        .timer-instance {
            width: 320px;
            flex-shrink: 0;
        }

        .global-control-btn {
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        
        footer { 
            background-color: var(--bg-secondary);
            transition: background-color 0.3s ease;
        }

        body.dark-mode footer {
            border-color: rgba(255, 255, 255, 0.1);
        }

        #landing-page {
            position: fixed;
            inset: 0;
            z-index: 200;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            transition: opacity 0.5s ease, visibility 0.5s;
        }

        body.dark-mode .landing-card h1 {
            color: #f1f5f9;
        }

        body.dark-mode .landing-card p {
            color: #94a3b8;
        }

        body.dark-mode .count-option {
            border-color: #475569;
            color: #cbd5e1;
        }

        body.dark-mode .count-option.active {
            border-color: var(--swiss-red);
            background-color: var(--swiss-red);
            color: white;
        }

        .landing-card {
            max-width: 450px;
            width: 90%;
        }

        .count-selector {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin: 24px 0;
        }

        .count-option {
            width: 45px;
            height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
        }

        .count-option.active {
            border-color: var(--swiss-red);
            background-color: var(--swiss-red);
            color: white;
        }

        body.dark-mode .timer-card:not(.is-finished) {
            background: var(--bg-secondary);
        }

        body.dark-mode .timer-card:not(.is-finished) .timer-display,
        body.dark-mode .timer-card:not(.is-finished) .timer-label {
            color: #f1f5f9;
        }

        body.dark-mode .timer-card:not(.is-finished) .text-slate-400,
        body.dark-mode .timer-card:not(.is-finished) .mark-30 {
            color: #cbd5e1;
        }

        body.dark-mode .timer-card:not(.is-finished) .mark-5 {
            color: var(--swiss-red);
        }

        body.dark-mode .timer-card:not(.is-finished) .text-slate-600 {
            color: #e2e8f0;
        }

        body.dark-mode .timer-card:not(.is-finished) .text-slate-800 {
            color: #f1f5f9;
        }

        body.dark-mode .timer-card:not(.is-finished) .border-y {
            border-color: #1e293b;
        }

        body.dark-mode .timer-card:not(.is-finished) .reset-btn {
            background-color: #1e293b;
            color: #cbd5e1;
        }

        body.dark-mode .timer-card:not(.is-finished) .reset-btn:hover {
            background-color: #0f172a;
            color: #f1f5f9;
        }

        body.dark-mode .timer-card:not(.is-finished) .edit-btn:hover {
            background-color: rgba(255, 255, 255, 0.1);
        }

        body.dark-mode #global-clock {
            color: #f1f5f9;
        }

        body.dark-mode #global-date {
            color: #fbbf24;
        }

        body.dark-mode #global-reset-btn,
        body.dark-mode #zoom-out-btn,
        body.dark-mode #zoom-in-btn,
        body.dark-mode #fullscreen-btn {
            background: #475569;
            border-color: #475569;
            color: #cbd5e1;
        }

        body.dark-mode #global-reset-btn:hover,
        body.dark-mode #zoom-out-btn:hover,
        body.dark-mode #zoom-in-btn:hover,
        body.dark-mode #fullscreen-btn:hover {
            color: #fbbf24;
            border-color: #fbbf24;
        }

        /* Dark Mode Toggle Slider Styles */
        body.dark-mode #dark-mode-toggle {
            background-color: #0f172a;
            border-color: #1e293b;
        }

        body.dark-mode #dark-mode-toggle .thumb {
            transform: translateX(62px);
            background-color: #1e293b;
            border-color: #334155;
            box-shadow: -2px 0 8px rgba(0,0,0,0.4);
        }

        body.dark-mode #dark-mode-toggle .moon-text {
            color: #f1f5f9;
        }
        
        body.dark-mode #dark-mode-toggle .sun-text {
            color: #475569;
        }

        .clock-only-btn {
            /* Styles for the clock-only mode button */
        }
        
        body.dark-mode .clock-only-btn {
            background-color: #1e293b;
            color: #cbd5e1;
        }

        body.dark-mode .clock-only-btn:hover {
            background-color: #0f172a;
            color: #f1f5f9;
        }

        body.dark-mode #edit-modal {
            background: rgba(0, 0, 0, 0.8);
        }

        body.dark-mode #edit-modal .glass-card {
            background: #334155;
            color: #f1f5f9;
        }

        body.dark-mode #edit-modal h2 {
            color: #f1f5f9;
        }

        body.dark-mode #edit-modal input {
            background: #1e293b;
            border-color: #475569;
            color: #f1f5f9;
        }

        /* Timer Warning & Danger Colors (Forces matching colors in both light and dark modes) */
        .timer-card:not(.is-finished) .timer-display.is-danger {
            color: var(--swiss-red) !important;
        }

        .timer-card:not(.is-finished) .timer-display.is-warning {
            color: #f97316 !important; /* Orange-500 */
        }

        /* Decorative Background Rings */
        .ring-container {
            position: fixed;
            bottom: -20px;
            left: -20px;
            opacity: 0.05;
            z-index: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            isolation: isolate;
        }

        body.dark-mode .ring-container {
            opacity: 0.02;
        }

        .ring-container svg {
            overflow: visible;
        }

        .ring {
            fill: none;
            stroke-width: 14;
            mix-blend-mode: multiply;
            opacity: 0.99;
        }

        body.dark-mode .ring {
            mix-blend-mode: normal;
            stroke: #ffffff;
        }

        .ring-primary {
            stroke: #E10031;
        }

        .ring-grey {
            stroke: #6b7280;
        }
    </style>
</head>
<body>

    <!-- Decorative Background Rings -->
    <div class="ring-container">
        <svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
            <!-- Top Ring -->
            <circle class="ring ring-primary" cx="100" cy="-8" r="90" />
            <!-- Bottom Ring -->
            <circle class="ring ring-primary" cx="100" cy="208" r="90" />
            <!-- Left Ring -->
            <circle class="ring ring-primary" cx="-8" cy="100" r="90" />
            <!-- Right Ring (Grey) -->
            <circle class="ring ring-grey" cx="208" cy="100" r="90" />
        </svg>
    </div>

    <!-- Global Top-Right Controls -->
    <div class="fixed top-4 right-4 flex items-center gap-2 z-[300]">
        <button id="zoom-out-btn" class="p-3 bg-white border border-slate-200 text-slate-600 hover:text-[#D52B1E] hover:border-[#D52B1E] rounded-2xl shadow-sm transition-all" title="Zoom Out">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/><path d="M8 11h6"/>
            </svg>
        </button>
        <button id="zoom-in-btn" class="p-3 bg-white border border-slate-200 text-slate-600 hover:text-[#D52B1E] hover:border-[#D52B1E] rounded-2xl shadow-sm transition-all" title="Zoom In">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/><path d="M11 8v6M8 11h6"/>
            </svg>
        </button>
        <button id="fullscreen-btn" class="p-3 bg-white border border-slate-200 text-slate-600 hover:text-[#D52B1E] hover:border-[#D52B1E] rounded-2xl shadow-sm transition-all" title="Enter Fullscreen">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/>
            </svg>
        </button>
        <button id="dark-mode-toggle" class="relative inline-flex h-[44px] w-[130px] items-center rounded-[22px] border border-slate-200 bg-white transition-colors duration-300 shadow-sm overflow-hidden flex-shrink-0 cursor-pointer" title="Toggle Dark Mode">
            <div class="absolute left-[16px] text-slate-400 z-0 text-[10px] font-black uppercase tracking-widest moon-text transition-colors duration-300">Dark</div>
            <div class="absolute right-[16px] text-slate-600 z-0 text-[10px] font-black uppercase tracking-widest sun-text transition-colors duration-300">Light</div>
            <span class="thumb transition-transform duration-300 translate-x-1 flex h-[34px] w-[64px] items-center justify-center rounded-[17px] bg-slate-50 shadow-[0_2px_5px_rgba(0,0,0,0.1)] z-10 border border-slate-200">
                <svg class="sun-icon text-amber-500" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
                </svg>
                <svg class="moon-icon text-amber-400 hidden" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
                </svg>
            </span>
        </button>
    </div>

    <!-- Landing Page -->
    <div id="landing-page">
        <div class="landing-card fade-in">
            <img src="https://www.nordangliaeducation.com/-/media/sisd-dubai/logos/horizontal-logo.png?rev=1e55495ba7364e8a978dd65e1d644f62.png" 
                 alt="SISD Logo" 
                 class="h-20 mx-auto mb-8 object-contain">
            
            <h1 class="text-6xl font-bold tracking-tighter text-slate-900 mb-4">Pro Timer</h1>
            <p class="text-slate-400 font-medium tracking-widest uppercase text-xs mb-10">SISD Timer Dashboard</p>
            
            <div class="glass-card p-8 border-slate-100">
                <label class="block text-xs font-bold mb-4 text-slate-500 uppercase tracking-widest">How many sessions to track?</label>
                <div class="count-selector">
                    <div class="count-option active" data-count="1">1</div>
                    <div class="count-option" data-count="2">2</div>
                    <div class="count-option" data-count="3">3</div>
                    <div class="count-option" data-count="4">4</div>
                    <div class="count-option" data-count="5">5</div>
                    <div class="count-option" data-count="6">6</div>
                </div>
                
                <button id="launch-app" class="w-full bg-[#D52B1E] hover:bg-[#b02419] text-white font-bold py-4 rounded-2xl shadow-lg shadow-red-500/20 transition-all flex items-center justify-center gap-3 group">
                    <span>Initialize Timer</span>
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" class="group-hover:translate-x-1 transition-transform"><path d="m9 18 6-6-6-6"/></svg>
                </button>

                <button id="launch-clock-only" class="w-full mt-3 bg-slate-100 hover:bg-slate-200 text-slate-600 font-bold py-4 rounded-2xl transition-all flex items-center justify-center gap-3 group clock-only-btn">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                    <span>Use as Clock</span>
                </button>
            </div>
        </div>
    </div>

    <!-- Main Dashboard -->
    <main id="app-container" class="w-full max-w-[1400px] mx-auto py-6 pb-32 hidden relative z-10">
        <button id="home-btn" class="absolute top-4 left-4 p-3 bg-[#D52B1E] hover:bg-[#b02419] text-white rounded-2xl shadow-md transition-all z-50" title="Back to Home">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/>
            </svg>
        </button>
        
        <div class="flex justify-center mb-8">
            <img src="https://www.nordangliaeducation.com/-/media/sisd-dubai/logos/horizontal-logo.png?rev=1e55495ba7364e8a978dd65e1d644f62.png" 
                 alt="SISD Logo" 
                 class="h-20 object-contain"
                 onerror="this.style.display='none'">
        </div>

        <div id="zoom-content">
            <div class="flex flex-col items-center justify-center mb-12 text-center px-4">
                <div id="global-clock" class="text-7xl md:text-8xl font-black tracking-tighter mono text-slate-900 leading-none">00:00:00</div>
                <div id="global-date" class="text-[#D52B1E] font-bold tracking-[0.4em] uppercase mt-4 text-base">Monday, Jan 1</div>
                
                <div id="global-controls" class="mt-8 flex items-center gap-4">
                    <button id="global-start-btn" class="global-control-btn flex items-center gap-3 bg-emerald-500 hover:bg-emerald-600 px-8 py-3 rounded-2xl shadow-lg shadow-emerald-500/20 text-white transition-all">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
                        <span class="text-xs font-black uppercase tracking-widest">Start All</span>
                    </button>
                    <button id="global-reset-btn" class="global-control-btn p-3 bg-white border border-slate-200 text-slate-400 hover:text-[#D52B1E] rounded-2xl shadow-sm transition-all" title="Reset All">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
                    </button>
                </div>
            </div>
            
            <div id="timers-list" class="px-4"></div>
        </div>
    </main>

    <!-- Global Footer -->
    <footer id="main-footer" class="fixed bottom-0 left-1/2 -translate-x-1/2 z-[300] w-fit mx-auto px-8 py-4 text-center text-slate-400 text-sm border-t border-x border-slate-100 rounded-t-3xl shadow-[0_-5px_15px_rgba(0,0,0,0.05)]">
        <p class="font-semibold text-slate-500">© 2026 Swiss International Scientific School in Dubai. All rights reserved.</p>
        <p class="text-[10px] font-semibold text-slate-300 mt-1">Dubai Healthcare City, Phase 2, Al Jaddaf, Dubai, PO Box 505002 UAE</p>
    </footer>

    <div id="edit-modal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-md z-[100] flex items-center justify-center hidden p-4">
        <div class="glass-card p-8 w-full max-w-lg shadow-2xl border-none">
            <h2 class="text-2xl font-bold mb-8 flex items-center gap-3 text-slate-900">
                <span class="w-2 h-8 bg-[#D52B1E] rounded-full"></span>
                Configuration
            </h2>
            <div class="grid grid-cols-1 gap-6">
                <div>
                    <label class="block text-xs font-bold mb-2 text-slate-400 uppercase tracking-widest">Title</label>
                    <input type="text" id="modal-title" class="w-full px-4 py-4 rounded-xl outline-none text-lg border border-slate-200 focus:border-[#D52B1E]">
                </div>
                <div class="grid grid-cols-3 gap-4">
                    <div>
                        <label class="block text-xs font-bold mb-2 text-slate-400 uppercase tracking-widest">Minutes</label>
                        <input type="number" id="modal-duration" class="w-full px-4 py-4 rounded-xl outline-none text-lg border border-slate-200 focus:border-[#D52B1E]" min="1">
                    </div>
                    <div>
                        <label class="block text-xs font-bold mb-2 text-slate-400 uppercase tracking-widest">Extra (%)</label>
                        <input type="number" id="modal-extra-percentage" class="w-full px-4 py-4 rounded-xl outline-none text-lg border border-slate-200 focus:border-[#D52B1E]" min="0" max="100" value="0">
                    </div>
                    <div>
                        <label class="block text-xs font-bold mb-2 text-slate-400 uppercase tracking-widest">Auto-Start</label>
                        <input type="time" id="modal-starttime" class="w-full px-4 py-4 rounded-xl outline-none text-lg border border-slate-200 focus:border-[#D52B1E]">
                    </div>
                </div>
                <div class="flex gap-4 pt-4">
                    <button id="modal-save" class="flex-2 bg-[#D52B1E] py-4 px-8 rounded-2xl font-bold text-white flex-grow">Apply Changes</button>
                    <button id="modal-cancel" class="flex-1 bg-slate-100 hover:bg-slate-200 text-slate-600 py-4 rounded-2xl font-bold transition-colors">Cancel</button>
                </div>
            </div>
        </div>
    </div>

    <template id="timer-template">
        <div class="timer-instance glass-card p-6 flex flex-col items-center gap-5 timer-card fade-in relative overflow-hidden text-center">
            <button class="edit-btn absolute top-3 right-3 z-[60] p-2 hover:bg-slate-50 rounded-full transition-all group">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="text-slate-300 group-hover:text-[#D52B1E]"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
            <div class="phase-indicator status-dot status-red mt-2 relative z-10"></div>
            <div class="flex flex-col gap-1 relative z-10">
                <h3 class="timer-label text-sm font-black tracking-[0.1em] uppercase text-slate-800">SESSION</h3>
                <span class="autostart-indicator hidden text-[9px] font-bold uppercase text-[#D52B1E]">@ 00:00</span>
            </div>
            <div class="timer-display text-6xl font-black mono tracking-tighter leading-none text-slate-900 transition-colors duration-300 relative z-10">25:00</div>
            <div class="w-full flex flex-col gap-2 py-3 border-y border-slate-50 relative z-10">
                <div class="flex justify-between items-center px-2">
                    <span class="text-[14px] font-bold text-slate-400 uppercase tracking-widest">30m MARK</span>
                    <span class="mark-30 text-lg mono font-bold text-slate-600">--:--</span>
                </div>
                <div class="flex justify-between items-center px-2">
                    <span class="text-[14px] font-bold text-slate-400 uppercase tracking-widest">5m MARK</span>
                    <span class="mark-5 text-lg mono font-bold text-[#D52B1E]">--:--</span>
                </div>
            </div>
            <div class="flex items-center gap-3 relative z-10">
                <button class="toggle-btn p-3 bg-[#D52B1E] text-white rounded-xl transition-all shadow-md hover:scale-105" title="Start/Pause">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M5 3l14 9-14 9V3z"/></svg>
                </button>
                <button class="reset-btn p-3 bg-slate-100 hover:bg-slate-200 text-slate-500 rounded-xl transition-all" title="Reset">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
                </button>
            </div>
        </div>
    </template>

    <script>
        const landingPage = document.getElementById('landing-page');
        const appContainer = document.getElementById('app-container');
        const mainFooter = document.getElementById('main-footer');
        const launchBtn = document.getElementById('launch-app');
        const launchClockBtn = document.getElementById('launch-clock-only');
        const homeBtn = document.getElementById('home-btn');
        const fullscreenBtn = document.getElementById('fullscreen-btn');
        const zoomInBtn = document.getElementById('zoom-in-btn');
        const zoomOutBtn = document.getElementById('zoom-out-btn');
        const zoomContent = document.getElementById('zoom-content');
        const darkModeToggle = document.getElementById('dark-mode-toggle');
        const countOptions = document.querySelectorAll('.count-option');
        const timersList = document.getElementById('timers-list');
        const timerTemplate = document.getElementById('timer-template');
        const clockEl = document.getElementById('global-clock');
        const dateEl = document.getElementById('global-date');
        const globalStartBtn = document.getElementById('global-start-btn');
        const globalResetBtn = document.getElementById('global-reset-btn');
        const globalControls = document.getElementById('global-controls');
        const landingCard = document.querySelector('.landing-card');
        const editModal = document.getElementById('edit-modal');
        const modalTitleInput = document.getElementById('modal-title');
        const modalDurationInput = document.getElementById('modal-duration');
        const modalExtraPercentageInput = document.getElementById('modal-extra-percentage');
        const modalStartTimeInput = document.getElementById('modal-starttime');
        const modalSave = document.getElementById('modal-save');
        const modalCancel = document.getElementById('modal-cancel');

        let activeEditingTimer = null;
        let timers = [];
        let currentClockStr = "00:00";
        let isAnyTimerRunning = false;
        let selectedTimerCount = 1;
        let clockIntervalId = null;

        // Dark Mode Initialization
        const savedDarkMode = localStorage.getItem('darkMode') === 'true';
        if (savedDarkMode) {
            document.body.classList.add('dark-mode');
            updateDarkModeIcon();
        }

        function updateDarkModeIcon() {
            const sunIcon = darkModeToggle.querySelector('.sun-icon');
            const moonIcon = darkModeToggle.querySelector('.moon-icon');
            if (document.body.classList.contains('dark-mode')) {
                sunIcon.classList.add('hidden');
                moonIcon.classList.remove('hidden');
            } else {
                sunIcon.classList.remove('hidden');
                moonIcon.classList.add('hidden');
            }
        }

        darkModeToggle.onclick = () => {
            document.body.classList.toggle('dark-mode');
            localStorage.setItem('darkMode', document.body.classList.contains('dark-mode'));
            updateDarkModeIcon();
        };

        countOptions.forEach(opt => {
            opt.addEventListener('click', () => {
                countOptions.forEach(o => o.classList.remove('active'));
                opt.classList.add('active');
                selectedTimerCount = parseInt(opt.dataset.count);
            });
        });

        launchBtn.onclick = () => {
            landingPage.style.opacity = '0';
            setTimeout(() => {
                landingPage.classList.add('hidden');
                appContainer.classList.remove('hidden');
                initializeTimers(selectedTimerCount);
            }, 500);
        };

        launchClockBtn.onclick = () => {
            landingPage.style.opacity = '0';
            setTimeout(() => {
                landingPage.classList.add('hidden');
                appContainer.classList.remove('hidden');
                initializeTimers(0);
            }, 500);
        };

        homeBtn.onclick = () => {
            if (clockIntervalId) clearInterval(clockIntervalId);
            timers.forEach(t => {
                if (t.isRunning) t.pause();
                clearInterval(t.timerId);
            });
            timers = [];
            appContainer.classList.add('hidden');
            landingPage.classList.remove('hidden');
            landingPage.style.opacity = '1';
            currentZoom = 100;
            zoomContent.style.zoom = '100%';
            landingCard.style.zoom = '100%';
        };

        function updateGlobalClock() {
            const now = new Date();
            const h = now.getHours().toString().padStart(2, '0');
            const m = now.getMinutes().toString().padStart(2, '0');
            const s = now.getSeconds().toString().padStart(2, '0');
            currentClockStr = `${h}:${m}`;
            clockEl.textContent = `${h}:${m}:${s}`;
            dateEl.textContent = now.toLocaleDateString('en-US', { weekday: 'long', month: 'short', day: 'numeric' });
            timers.forEach(t => t.checkAutoStart(currentClockStr));
            updateGlobalUIState();
        }

        function updateGlobalUIState() {
            isAnyTimerRunning = timers.some(t => t.isRunning);
            const btnSpan = globalStartBtn.querySelector('span');
            const btnIcon = globalStartBtn.querySelector('svg');
            if (isAnyTimerRunning) {
                globalStartBtn.classList.replace('bg-emerald-500', 'bg-amber-500');
                btnSpan.textContent = "Pause All";
                btnIcon.innerHTML = `<rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>`;
            } else {
                globalStartBtn.classList.replace('bg-amber-500', 'bg-emerald-500');
                btnSpan.textContent = "Start All";
                btnIcon.innerHTML = `<path d="M8 5v14l11-7z"/>`;
            }
        }

        globalStartBtn.onclick = () => {
            if (isAnyTimerRunning) timers.forEach(t => t.pause());
            else timers.forEach(t => t.start());
            updateGlobalUIState();
        };

        globalResetBtn.onclick = () => {
            timers.forEach(t => t.reset());
            updateGlobalUIState();
        };

        fullscreenBtn.onclick = () => {
            const elem = document.documentElement;
            if (!document.fullscreenElement) {
                if (elem.requestFullscreen) elem.requestFullscreen();
                fullscreenBtn.title = "Exit Fullscreen";
            } else {
                if (document.exitFullscreen) document.exitFullscreen();
                fullscreenBtn.title = "Enter Fullscreen";
            }
        };

        let currentZoom = 100;
        zoomInBtn.onclick = () => { 
            if (currentZoom < 200) { 
                currentZoom += 10; 
                zoomContent.style.zoom = currentZoom + '%'; 
                landingCard.style.zoom = currentZoom + '%';
            } 
        };
        zoomOutBtn.onclick = () => { 
            if (currentZoom > 50) { 
                currentZoom -= 10; 
                zoomContent.style.zoom = currentZoom + '%'; 
                landingCard.style.zoom = currentZoom + '%';
            } 
        };

        function initializeTimers(count) {
            timersList.innerHTML = '';
            timers = [];

            if (count === 0) {
                globalControls.classList.add('hidden');
            } else {
                globalControls.classList.remove('hidden');
            }

            const defaultMins = [25, 120, 5, 75, 15, 60];
            const labels = ['Session A', 'Session B', 'Session C', 'Session D', 'Session E', 'Session F'];
            
            for (let i = 0; i < count; i++) {
                const config = {
                    id: i + 1,
                    title: labels[i] || `Session ${String.fromCharCode(65 + i)}`,
                    minutes: defaultMins[i] || 25,
                    extraPercentage: 0
                };
                timers.push(new Timer(config, timersList));
            }
            if (clockIntervalId) clearInterval(clockIntervalId);
            clockIntervalId = setInterval(updateGlobalClock, 1000);
            updateGlobalClock();
        }

        class Timer {
            constructor(config, container) {
                this.id = config.id;
                this.title = config.title;
                this.baseMinutes = config.minutes;
                this.extraPercentage = config.extraPercentage || 0;
                this.totalSeconds = Math.floor(this.baseMinutes * 60 * (1 + this.extraPercentage / 100));
                this.timeLeft = this.totalSeconds;
                this.timerId = null;
                this.isRunning = false;
                this.scheduledStartTime = "";

                const clone = timerTemplate.content.cloneNode(true);
                this.el = clone.querySelector('.timer-instance');
                this.displayEl = this.el.querySelector('.timer-display');
                this.labelEl = this.el.querySelector('.timer-label');
                this.toggleBtn = this.el.querySelector('.toggle-btn');
                this.mark30El = this.el.querySelector('.mark-30');
                this.mark5El = this.el.querySelector('.mark-5');
                this.autoBadge = this.el.querySelector('.autostart-indicator');
                this.phaseDot = this.el.querySelector('.phase-indicator');

                this.toggleBtn.onclick = () => this.toggle();
                this.el.querySelector('.edit-btn').onclick = (e) => { e.stopPropagation(); this.openEdit(); };
                this.el.querySelector('.reset-btn').onclick = () => this.reset();

                this.updateUI();
                container.appendChild(this.el);
            }

            updateUI() {
                const mins = Math.floor(this.timeLeft / 60);
                const secs = this.timeLeft % 60;
                this.displayEl.textContent = `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
                this.labelEl.textContent = this.title;
                
                // Clear state classes
                this.displayEl.classList.remove('is-danger', 'is-warning');

                if (this.timeLeft === 0) {
                    this.el.classList.add('is-finished');
                } else {
                    this.el.classList.remove('is-finished');
                    if (this.timeLeft <= 300) {
                        this.displayEl.classList.add('is-danger');
                    } else if (this.timeLeft <= 1800) {
                        this.displayEl.classList.add('is-warning');
                    }
                }

                if (this.scheduledStartTime) {
                    this.autoBadge.classList.remove('hidden');
                    this.autoBadge.textContent = `@ ${this.scheduledStartTime}`;
                } else {
                    this.autoBadge.classList.add('hidden');
                }
                this.updatePhaseIndicator();
                this.calculateMilestones();
            }

            updatePhaseIndicator() {
                const elapsed = this.totalSeconds - this.timeLeft;
                const isFirstHour = elapsed < 3600;
                const isLast15 = this.timeLeft < 900;
                if (isFirstHour || isLast15) this.phaseDot.className = 'phase-indicator status-dot status-red';
                else this.phaseDot.className = 'phase-indicator status-dot status-green';
            }

            calculateMilestones() {
                const now = new Date();
                if (this.totalSeconds > 1800) {
                    const diff = Math.max(0, this.timeLeft - 1800);
                    const time = new Date(now.getTime() + diff * 1000);
                    this.mark30El.textContent = time.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', hour12: false });
                } else this.mark30El.textContent = '---';

                if (this.totalSeconds > 300) {
                    const diff = Math.max(0, this.timeLeft - 300);
                    const time = new Date(now.getTime() + diff * 1000);
                    this.mark5El.textContent = time.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', hour12: false });
                } else this.mark5El.textContent = '---';
            }

            checkAutoStart(currentTimeStr) {
                if (this.scheduledStartTime === currentTimeStr && !this.isRunning && this.timeLeft === this.totalSeconds) {
                    this.start();
                    this.scheduledStartTime = ""; 
                    this.updateUI();
                }
            }

            toggle() {
                if (this.isRunning) this.pause();
                else this.start();
                updateGlobalUIState();
            }

            start() {
                if (this.isRunning || this.timeLeft <= 0) return;
                this.isRunning = true;
                this.toggleBtn.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>`;
                this.toggleBtn.classList.replace('bg-[#D52B1E]', 'bg-amber-500');
                this.timerId = setInterval(() => {
                    if (this.timeLeft > 0) { 
                        this.timeLeft--; 
                        this.updateUI(); 
                    } else {
                        this.pause();
                        this.updateUI();
                    }
                }, 1000);
            }

            pause() {
                clearInterval(this.timerId);
                this.isRunning = false;
                this.toggleBtn.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M5 3l14 9-14 9V3z"/></svg>`;
                this.toggleBtn.classList.replace('bg-amber-500', 'bg-[#D52B1E]');
                updateGlobalUIState();
            }

            reset() {
                this.pause();
                this.timeLeft = this.totalSeconds;
                this.updateUI();
            }

            openEdit() {
                activeEditingTimer = this;
                modalTitleInput.value = this.title;
                modalDurationInput.value = this.baseMinutes;
                modalExtraPercentageInput.value = this.extraPercentage;
                modalStartTimeInput.value = this.scheduledStartTime;
                editModal.classList.remove('hidden');
            }

            save(newTitle, newMinutes, newExtraPercentage, startTime) {
                this.title = newTitle;
                this.baseMinutes = newMinutes;
                this.extraPercentage = newExtraPercentage;
                this.totalSeconds = Math.floor(newMinutes * 60 * (1 + newExtraPercentage / 100));
                this.scheduledStartTime = startTime;
                this.reset();
            }
        }

        modalCancel.onclick = () => { editModal.classList.add('hidden'); activeEditingTimer = null; };
        modalSave.onclick = () => {
            if (activeEditingTimer) {
                const t = modalTitleInput.value.trim() || 'Session';
                const d = parseInt(modalDurationInput.value) || 1;
                const e = parseInt(modalExtraPercentageInput.value) || 0;
                const s = modalStartTimeInput.value;
                activeEditingTimer.save(t, d, e, s);
            }
            editModal.classList.add('hidden');
        };
    </script>
</body>
</html>
